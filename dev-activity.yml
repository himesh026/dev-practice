# .github/workflows/dev-activity.yml
# ─────────────────────────────────────────────────────────────────────────────
# Simulates a real developer's daily workflow:
#   • Runs 3× per day at non-round, human-looking times
#   • Each run has a 35% chance to skip (natural inactivity)
#   • On an active run, picks ONE task: GFG POTD / Frontend / Backend
#   • Commits the output only if a new file was created
# ─────────────────────────────────────────────────────────────────────────────

name: Dev Activity

on:
  schedule:
    # Morning session  — 08:22 UTC
    - cron: "22 8 * * *"
    # Afternoon session — 13:47 UTC
    - cron: "47 13 * * *"
    # Evening session  — 20:09 UTC
    - cron: "9 20 * * *"

  # Manual trigger for testing (Actions tab → Run workflow)
  workflow_dispatch:

jobs:
  run-daily-task:
    name: Daily Dev Task
    runs-on: ubuntu-latest

    permissions:
      contents: write   # Required to push commits back to the repo

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Set up Node.js ────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # ── 3. Install dependencies (if any) ────────────────────────────────
      - name: Install dependencies
        run: |
          if [ -f package.json ] && [ -s package.json ]; then
            npm ci --prefer-offline --no-audit
          else
            echo "No package.json or empty — skipping install"
          fi

      # ── 4. Configure git remote with auth token ─────────────────────────
      - name: Configure git remote
        run: |
          git remote set-url origin \
            https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git

      # ── 5. Pull latest to avoid non-fast-forward push rejections ────────
      - name: Pull latest commits
        run: git pull --rebase --autostash origin main

      # ── 6. Run the automation script ─────────────────────────────────────
      - name: Run daily task
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GIT_USER_NAME:  "github-actions[bot]"
          GIT_USER_EMAIL: "41898282+github-actions[bot]@users.noreply.github.com"
        run: node index.js

      # ── 7. Write job summary ─────────────────────────────────────────────
      - name: Write job summary
        if: always()
        run: |
          echo "## Dev Activity Run" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Date | $(date -u '+%Y-%m-%d') |" >> $GITHUB_STEP_SUMMARY
          echo "| Time | $(date -u '+%H:%M UTC') |" >> $GITHUB_STEP_SUMMARY
          echo "| Trigger | ${{ github.event_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
