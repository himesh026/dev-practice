name: Dev Activity

on:
  schedule:
    - cron: "22 8 * * *"
    - cron: "47 13 * * *"
    - cron: "9 20 * * *"
  workflow_dispatch:

jobs:
  run-daily-task:
    name: Daily Dev Task
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: |
          if [ -f package.json ] && [ -s package.json ]; then
            npm ci --prefer-offline --no-audit
          else
            echo "No package.json or empty — skipping install"
          fi

      # Debug: confirm token reaches Node
      - name: Debug token
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          if [ -z "$PAT_TOKEN" ]; then
            echo "ERROR: PAT_TOKEN is empty in shell"
          else
            echo "OK: PAT_TOKEN is set in shell (length=${#PAT_TOKEN})"
          fi
          node -e "console.log('Node PAT_TOKEN:', process.env.PAT_TOKEN ? 'SET len=' + process.env.PAT_TOKEN.length : 'UNDEFINED')"

      - name: Run daily task
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PAT_TOKEN:      ${{ secrets.PAT_TOKEN }}
          GIT_USER_NAME:  "himesh026"
          GIT_USER_EMAIL: "himeshdhaka616@gmail.com"
        run: node index.js

      - name: Write job summary
        if: always()
        run: |
          echo "## Dev Activity Run" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Date | $(date -u '+%Y-%m-%d') |" >> $GITHUB_STEP_SUMMARY
          echo "| Time | $(date -u '+%H:%M UTC') |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
